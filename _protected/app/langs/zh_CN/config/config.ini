[language]
; The prefix of the language
lang = zh

; ltr = Left to right language (English, Italiano, Español, ...) | rtl = right to left language (Arabic, Hebrew, ...).
dir = ltr

; Language for encoding: UTF-8 generally still works.
charset = "utf-8"

[language.information]
name = 中文简体
author = "pH7Builder Community"
email = "hello@ph7builder.com"
website = "http://ph7builder.com"

[language.application]
; Timezone for the web app
timezone = "Asia/Shanghai"

; Date format displays on the web app
date_time_format = "Y-m-d H:i:s"
date_format = "Y-m-d"
textual_date_format = "Y年m月d日"
time_format = "H:i:s"
